<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a6b3c">
    <title>N-CURE Pro</title>

    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22N-CURE%22%2C%22short_name%22%3A%22N-CURE%22%2C%22start_url%22%3A%22index.html%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%231a6b3c%22%2C%22theme_color%22%3A%22%231a6b3c%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22logo.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">

    <style>
        :root { --primary: #1a6b3c; --primary-dark: #0f4024; --bg: #f2f2f2; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #333; line-height: 1.3; }

        /* الهيدر وزر الإعدادات */
        .header { background: var(--primary); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 99; }
        .header h1 { font-size: 1rem; }
        .settings-btn { background: none; border: none; font-size: 1.3rem; color: white; cursor: pointer; }

        /* التبويبات */
        .tabs { display: flex; background: white; border-bottom: 1px solid #ddd; }
        .tab { flex: 1; padding: 10px; border: none; background: none; font-weight: bold; color: #666; font-size: 0.85rem; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #f9f9f9; }

        .content { padding: 8px; }
        .screen { display: none; }
        .screen.active { display: block; }

        /* الكروت */
        .card { background: white; border-radius: 8px; padding: 10px; margin-bottom: 8px; border: 1px solid #e0e0e0; }
        .card-title { font-size: 0.8rem; font-weight: bold; color: var(--primary); margin-bottom: 6px; border-right: 3px solid var(--primary); padding-right: 6px; }

        label { font-size: 0.7rem; font-weight: bold; display: block; margin-top: 4px; color: #555; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 0.9rem; margin-top: 2px; }
        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 8px; font-size: 0.9rem; }
        .btn-main { background: var(--primary); color: white; }
        .btn-save { background: #10b981; color: white; }
        .btn-close { background: #eee; color: #333; }

        /* الجدول المفصل */
        .table-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; background: #eee; padding: 5px; font-size: 0.7rem; font-weight: bold; margin-top: 10px; }
        .table-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; padding: 5px; font-size: 0.75rem; border-bottom: 1px solid #f0f0f0; align-items: center; }
        .total-box { text-align: center; padding: 10px; font-weight: bold; color: var(--primary); font-size: 1.1rem; }

        /* مودال مستقل */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal { background: white; width: 100%; border-radius: 12px; padding: 15px; max-height: 80vh; overflow-y: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .record-item { background: white; padding: 10px; border-radius: 8px; margin-bottom: 6px; border: 1px solid #ddd; }
        .history-line { font-size: 0.7rem; color: #666; border-bottom: 1px dashed #eee; padding: 3px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>N-CURE Professional</h1>
        <small id="clock" style="font-size: 0.6rem;"></small>
    </div>
    <button class="settings-btn" onclick="openModal('settings-modal')">⚙️</button>
</div>

<div class="tabs">
    <button class="tab active" onclick="showScreen(0)">➕ فاتورة</button>
    <button class="tab" onclick="showScreen(1)">📦 السجلات</button>
    <button class="tab" onclick="showScreen(2)">🧮 حاسبة</button>
</div>

<div class="content">
    <div class="screen active" id="s0">
        <div class="card">
            <div class="card-title">بيانات العميل</div>
            <label>اسم الصيدلية</label>
            <input type="text" id="p-pharm" value="صيدلية / ">
            <label>المستلم (دكتور)</label>
            <input type="text" id="p-doc" value="دكتور/ ">
            <label>التاريخ</label>
            <input type="date" id="p-date">
        </div>
        <div class="card">
            <div class="card-title">إضافة أصناف</div>
            <select id="p-drug" onchange="updatePre()"></select>
            <div style="display:flex; gap:5px">
                <div style="flex:1"><label>خصم%</label><input type="number" id="p-disc" value="25" inputmode="decimal" oninput="updatePre()"></div>
                <div style="flex:1"><label>كمية</label><input type="number" id="p-qty" value="1" inputmode="numeric" oninput="updatePre()"></div>
            </div>
            <div id="pre-box" style="display:none; text-align:center; font-size:0.8rem; color:var(--primary); margin-top:5px; font-weight:bold;"></div>
            <button class="btn btn-main" onclick="addItem()">➕ إضافة للصنف</button>
        </div>
        <div id="cart-card" class="card" style="display:none">
            <div class="card-title">جدول الفاتورة</div>
            <div class="table-header"><span>الصنف</span><span>سعر</span><span>كمية</span><span>صافي</span></div>
            <div id="cart-list"></div>
            <div class="total-box">المجموع: <span id="cart-total">0</span> ج</div>
            <label>المبلغ المدفوع</label>
            <input type="number" id="p-paid" placeholder="0.00" inputmode="decimal">
            <button class="btn btn-save" onclick="saveInv()">💾 حفظ الفاتورة نهائياً</button>
        </div>
    </div>

    <div class="screen" id="s1">
        <div id="rec-list"></div>
    </div>

    <div class="screen" id="s2">
        <div class="card">
            <div class="card-title">حاسبة سريعة</div>
            <select id="c-drug" onchange="doCalc()"></select>
            <label>الخصم %</label>
            <input type="number" id="c-disc" value="25" inputmode="decimal" oninput="doCalc()">
            <div class="total-box" id="c-res">0.00 ج</div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="settings-modal">
    <div class="modal">
        <div class="card-title">⚙️ الإعدادات العامة</div>
        <button class="btn btn-close" onclick="exportData()" style="margin-bottom:8px">📥 تصدير البيانات</button>
        <button class="btn" style="background:#fee2e2; color:red" onclick="clearData()">🗑️ مسح جميع السجلات</button>
        <button class="btn btn-main" onclick="closeModal('settings-modal')" style="margin-top:15px">إغلاق</button>
    </div>
</div>

<div class="modal-overlay" id="inv-modal">
    <div class="modal" id="inv-details-content"></div>
</div>

<script>
    let app = { drugs: [{id:1, name:'Vitamin D-400', price:50}, {id:2, name:'Probiotic', price:125}], logs: [], next: 101 };
    let tempCart = [];

    function init() {
        const d = localStorage.getItem('ncure_final_v5');
        if(d) app = JSON.parse(d);
        document.getElementById('p-date').valueAsDate = new Date();
        loadSelects(); renderRecs(); tick();
    }

    function save() { localStorage.setItem('ncure_final_v5', JSON.stringify(app)); }

    function showScreen(i) {
        document.querySelectorAll('.screen, .tab').forEach((el, idx) => {
            el.classList.toggle('active', idx % 3 === i);
        });
        if(i===1) renderRecs();
    }

    function loadSelects() {
        const opt = '<option value="">-- اختر صنف --</option>' + app.drugs.map(x=>`<option value="${x.id}">${x.name} (${x.price}ج)</option>`).join('');
        document.getElementById('p-drug').innerHTML = opt;
        document.getElementById('c-drug').innerHTML = opt;
    }

    function updatePre() {
        const id = document.getElementById('p-drug').value;
        if(!id) return;
        const itm = app.drugs.find(x=>x.id==id);
        const net = itm.price * (1 - (document.getElementById('p-disc').value/100));
        document.getElementById('pre-box').innerHTML = `صافي القطعة: ${net.toFixed(2)} ج`;
        document.getElementById('pre-box').style.display = 'block';
    }

    function addItem() {
        const id = document.getElementById('p-drug').value;
        if(!id) return alert('اختر صنف');
        const itm = app.drugs.find(x=>x.id==id);
        const net = itm.price * (1 - (document.getElementById('p-disc').value/100));
        const q = document.getElementById('p-qty').value;
        tempCart.push({ name: itm.name, price: net, qty: q, sub: net * q });
        renderCart();
    }

    function renderCart() {
        const c = document.getElementById('cart-card');
        c.style.display = tempCart.length ? 'block' : 'none';
        document.getElementById('cart-list').innerHTML = tempCart.map(i=>`
            <div class="table-row"><span>${i.name}</span><span>${i.price.toFixed(1)}</span><span>${i.qty}</span><span>${i.sub.toFixed(1)}</span></div>
        `).join('');
        document.getElementById('cart-total').innerText = tempCart.reduce((a,b)=>a+b.sub, 0).toFixed(2);
    }

    function saveInv() {
        const total = tempCart.reduce((a,b)=>a+b.sub, 0);
        const paid = parseFloat(document.getElementById('p-paid').value) || 0;
        app.logs.unshift({
            id: app.next++,
            pharm: document.getElementById('p-pharm').value,
            doc: document.getElementById('p-doc').value,
            date: document.getElementById('p-date').value,
            items: [...tempCart],
            total, paid,
            history: [{ date: new Date().toLocaleString('ar-EG'), amt: paid }]
        });
        save(); tempCart = []; renderCart(); 
        document.getElementById('p-paid').value = '';
        showScreen(1);
    }

    function renderRecs() {
        document.getElementById('rec-list').innerHTML = app.logs.map(l=>`
            <div class="record-item" onclick="openInv(${l.id})">
                <div style="font-weight:bold; font-size:0.85rem">${l.pharm}</div>
                <div style="font-size:0.7rem; color:#666">${l.doc} | ${l.date}</div>
                <div style="font-weight:bold; color:${(l.total-l.paid)>0?'red':'green'}; font-size:0.8rem">المتبقي: ${(l.total-l.paid).toFixed(1)} ج</div>
            </div>
        `).join('');
    }

    function openInv(id) {
        const l = app.logs.find(x=>x.id==id);
        document.getElementById('inv-details-content').innerHTML = `
            <div class="card-title">${l.pharm}</div>
            <p style="font-size:0.75rem">${l.doc} - ${l.date}</p>
            <div class="table-header"><span>الصنف</span><span>سعر</span><span>كمية</span><span>صافي</span></div>
            ${l.items.map(i=>`<div class="table-row"><span>${i.name}</span><span>${i.price.toFixed(1)}</span><span>${i.qty}</span><span>${i.sub.toFixed(1)}</span></div>`).join('')}
            <div class="total-box">الإجمالي: ${l.total.toFixed(2)} ج</div>
            <div style="background:#f9f9f9; padding:8px; border-radius:8px">
                <p style="font-size:0.7rem"><b>سجل التحصيل:</b></p>
                ${l.history.map(h=>`<div class="history-line"><span>${h.date}</span><b>${h.amt} ج</b></div>`).join('')}
            </div>
            <input type="number" id="up-amt" placeholder="مبلغ جديد" inputmode="decimal" style="margin-top:8px">
            <button class="btn btn-save" onclick="updatePaid(${id})">تحديث السجل</button>
            <button class="btn btn-close" onclick="closeModal('inv-modal')">إغلاق</button>
        `;
        openModal('inv-modal');
    }

    function updatePaid(id) {
        const amt = parseFloat(document.getElementById('up-amt').value);
        if(!amt) return;
        const l = app.logs.find(x=>x.id==id);
        l.paid += amt;
        l.history.unshift({ date: new Date().toLocaleString('ar-EG'), amt: amt });
        save(); renderRecs(); openInv(id);
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function doCalc() {
        const id = document.getElementById('c-drug').value;
        if(!id) return;
        const itm = app.drugs.find(x=>x.id==id);
        const res = itm.price * (1 - (document.getElementById('c-disc').value/100));
        document.getElementById('c-res').innerText = res.toFixed(2) + ' ج';
    }
    function exportData() { alert(JSON.stringify(app)); }
    function clearData() { if(confirm('حذف كل السجلات؟')){ app.logs=[]; save(); location.reload(); } }
    function tick() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-EG'); setTimeout(tick, 1000); }
    init();
</script>
</body>
</html>
