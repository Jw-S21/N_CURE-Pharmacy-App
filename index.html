<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="N-CURE">
    <meta name="theme-color" content="#1a6b3c">

    <title>N-CURE Professional</title>

    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22N-CURE%20Professional%22%2C%22short_name%22%3A%22N-CURE%22%2C%22start_url%22%3A%22index.html%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%231a6b3c%22%2C%22theme_color%22%3A%22%231a6b3c%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22logo.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">

    <style>
        :root {
            --primary: #1a6b3c;
            --primary-dark: #145033;
            --primary-light: #e8f5ee;
            --danger: #ef4444;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--gray-100); color: #111; overflow-x: hidden; }
        
        .header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-tabs { display: flex; background: white; border-bottom: 2px solid var(--gray-200); }
        .nav-tab { flex: 1; padding: 15px; border: none; background: none; font-weight: bold; color: #555; cursor: pointer; }
        .nav-tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: var(--primary-light); }
        
        .content { padding: 15px; }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--gray-200); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card-title { font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; color: var(--primary); border-right: 4px solid var(--primary); padding-right: 10px; }
        
        input, select { width: 100%; padding: 12px; border: 1.5px solid var(--gray-200); border-radius: 8px; font-size: 1rem; margin-top: 5px; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; display: block; text-align: center; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-secondary { background: var(--gray-200); color: #333; }

        .record-card { border: 1px solid var(--gray-200); padding: 12px; border-radius: 10px; margin-bottom: 10px; background: white; }
        .history-list { font-size: 0.8rem; background: #fafafa; padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px dashed #ccc; }
        .history-item { border-bottom: 1px solid #eee; padding: 5px 0; display: flex; justify-content: space-between; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
        .modal { background: white; width: 100%; max-width: 500px; border-radius: 15px; padding: 20px; max-height: 90vh; overflow-y: auto; }
        
        .total-price { font-size: 1.2rem; font-weight: bold; color: var(--primary); text-align: center; margin: 10px 0; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1 style="font-size: 1.2rem;">N-CURE Professional</h1>
        <p id="live-clock" style="font-size: 0.7rem; opacity: 0.8;"></p>
    </div>
</div>

<div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab(0)">➕ فاتورة</button>
    <button class="nav-tab" onclick="switchTab(1)">📦 السجلات</button>
    <button class="nav-tab" onclick="switchTab(2)">🧮 حاسبة</button>
</div>

<div class="content">
    <div class="screen active" id="screen-0">
        <div class="card">
            <div class="card-title">بيانات العميل</div>
            <input type="text" id="pharm-name" value="صيدلية / ">
            <input type="date" id="inv-date">
        </div>
        <div class="card">
            <div class="card-title">إضافة أصناف</div>
            <select id="drug-sel" onchange="previewPrice()"></select>
            <div style="display:flex; gap:10px">
                <div style="flex:1"><label style="font-size:0.7rem">خصم %</label><input type="number" id="disc" value="25" inputmode="decimal" oninput="previewPrice()"></div>
                <div style="flex:1"><label style="font-size:0.7rem">كمية</label><input type="number" id="qty" value="1" inputmode="numeric" oninput="previewPrice()"></div>
            </div>
            <div class="total-price" id="pre-total" style="display:none">0.00 ج</div>
            <button class="btn btn-primary" onclick="addToList()">➕ إضافة</button>
        </div>
        <div id="cart-area" class="card" style="display:none">
            <div class="card-title">الأصناف المضافة</div>
            <div id="cart-items"></div>
            <div class="total-price">الإجمالي النهائي: <span id="final-total">0</span> ج</div>
            <input type="number" id="paid-now" placeholder="المبلغ المدفوع الآن" inputmode="decimal">
            <button class="btn btn-success" onclick="saveInvoice()">💾 حفظ الفاتورة</button>
        </div>
    </div>

    <div class="screen" id="screen-1">
        <div id="records-list"></div>
    </div>

    <div class="screen" id="screen-2">
        <div class="card">
            <div class="card-title">حاسبة الخصم السريعة</div>
            <select id="calc-sel" onchange="quickCalc()"></select>
            <input type="number" id="calc-disc" value="25" inputmode="decimal" oninput="quickCalc()" placeholder="الخصم %">
            <div class="total-price" id="calc-res">0.00 ج</div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-content"></div>
</div>

<script>
    let db = { drugs: [{id:1, name:'Vitamin D-400', price:50}, {id:2, name:'Probiotic', price:125}], invoices: [], nextId: 1001 };
    let cart = [];

    function init() {
        const saved = localStorage.getItem('ncure_v3');
        if(saved) db = JSON.parse(saved);
        document.getElementById('inv-date').valueAsDate = new Date();
        loadLists(); renderRecords(); startTime();
    }

    function saveData() { localStorage.setItem('ncure_v3', JSON.stringify(db)); }

    function switchTab(i) {
        document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
        document.getElementById(`screen-${i}`).classList.add('active');
        document.querySelectorAll('.nav-tab')[i].classList.add('active');
    }

    function loadLists() {
        const h = '<option value="">-- اختر المنتج --</option>' + db.drugs.map(d=>`<option value="${d.id}">${d.name} (${d.price}ج)</option>`).join('');
        document.getElementById('drug-sel').innerHTML = h;
        document.getElementById('calc-sel').innerHTML = h;
    }

    function previewPrice() {
        const id = document.getElementById('drug-sel').value;
        if(!id) return;
        const d = db.drugs.find(x=>x.id==id);
        const total = (d.price * (1 - (document.getElementById('disc').value/100))) * document.getElementById('qty').value;
        document.getElementById('pre-total').innerText = total.toFixed(2) + ' ج';
        document.getElementById('pre-total').style.display = 'block';
    }

    function addToList() {
        const id = document.getElementById('drug-sel').value;
        if(!id) return;
        const d = db.drugs.find(x=>x.id==id);
        const total = (d.price * (1 - (document.getElementById('disc').value/100))) * document.getElementById('qty').value;
        cart.push({ name: d.name, total });
        renderCart();
    }

    function renderCart() {
        document.getElementById('cart-area').style.display = 'block';
        document.getElementById('cart-items').innerHTML = cart.map(c=>`<div>${c.name} - ${c.total.toFixed(2)}ج</div>`).join('');
        document.getElementById('final-total').innerText = cart.reduce((a,b)=>a+b.total, 0).toFixed(2);
    }

    function saveInvoice() {
        const total = cart.reduce((a,b)=>a+b.total, 0);
        const paid = parseFloat(document.getElementById('paid-now').value) || 0;
        const timeStr = new Date().toLocaleString('ar-EG');
        db.invoices.unshift({
            id: db.nextId++,
            pharmacy: document.getElementById('pharm-name').value,
            date: document.getElementById('inv-date').value,
            total, paid,
            history: [{ time: timeStr, amount: paid }]
        });
        saveData(); cart = []; document.getElementById('cart-area').style.display='none';
        renderRecords(); switchTab(1);
    }

    function renderRecords() {
        document.getElementById('records-list').innerHTML = db.invoices.map(inv=>`
            <div class="record-card" onclick="showDetails(${inv.id})">
                <b>${inv.pharmacy}</b><br>
                <small>#${inv.id} - ${inv.date}</small>
                <div style="color:${inv.paid >= inv.total ? 'green':'red'}">المتبقي: ${(inv.total - inv.paid).toFixed(2)} ج</div>
            </div>
        `).join('');
    }

    function showDetails(id) {
        const inv = db.invoices.find(i=>i.id==id);
        document.getElementById('modal-content').innerHTML = `
            <h3>${inv.pharmacy}</h3>
            <p>إجمالي الفاتورة: ${inv.total.toFixed(2)} ج</p>
            <div class="history-list">
                <b>سجل التحصيلات:</b>
                ${inv.history.map(h=>`<div class="history-item"><span>${h.time}</span> <b>${h.amount} ج</b></div>`).join('')}
            </div>
            <input type="number" id="add-pay" placeholder="مبلغ تحصيل جديد" inputmode="decimal" style="margin-top:10px">
            <button class="btn btn-success" onclick="addPayment(${id})">إضافة المبلغ للسجل</button>
            <button class="btn btn-secondary" onclick="closeModal()">إغلاق</button>
        `;
        document.getElementById('modal-overlay').style.display='flex';
    }

    function addPayment(id) {
        const amt = parseFloat(document.getElementById('add-pay').value);
        if(!amt) return;
        const inv = db.invoices.find(i=>i.id==id);
        inv.paid += amt;
        inv.history.unshift({ time: new Date().toLocaleString('ar-EG'), amount: amt });
        saveData(); renderRecords(); showDetails(id);
    }

    function quickCalc() {
        const id = document.getElementById('calc-sel').value;
        if(!id) return;
        const d = db.drugs.find(x=>x.id==id);
        const res = d.price * (1 - (document.getElementById('calc-disc').value/100));
        document.getElementById('calc-res').innerText = res.toFixed(2) + ' ج';
    }

    function closeModal() { document.getElementById('modal-overlay').style.display='none'; }
    function startTime() { document.getElementById('live-clock').innerHTML = new Date().toLocaleTimeString('ar-EG'); setTimeout(startTime,1000); }
    init();
</script>
</body>
</html>
