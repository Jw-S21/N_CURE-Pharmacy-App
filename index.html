<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a6b3c">
    <title>N-CURE Professional</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="N-CURE">
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22N-CURE%20Professional%22%2C%22short_name%22%3A%22N-CURE%22%2C%22start_url%22%3A%22index.html%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%231a6b3c%22%2C%22theme_color%22%3A%22%231a6b3c%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22logo.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">

    <style>
        :root {
            --primary: #1a6b3c;
            --primary-dark: #145033;
            --primary-light: #e8f5ee;
            --secondary: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-700: #374151;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--gray-100); color: #111; line-height: 1.6; overflow-x: hidden; }
        
        /* منع سحب الصفحة للتحديث في بعض الهواتف للحفاظ على مظهر التطبيق */
        html { overscroll-behavior-y: contain; }

        .container { max-width: 600px; margin: 0 auto; background: white; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 20px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .logo-text h1 { font-size: 1.2rem; }
        .logo-text p { font-size: 0.7rem; opacity: 0.8; }
        
        .nav-tabs { display: flex; border-bottom: 2px solid var(--gray-200); background: white; }
        .nav-tab { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-weight: bold; color: var(--gray-700); transition: 0.3s; font-size: 0.9rem; }
        .nav-tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: var(--primary-light); }
        
        .content { padding: 15px; flex: 1; padding-bottom: 30px; }
        .screen { display: none; animation: fadeIn 0.3s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .card { background: white; border: 1px solid var(--gray-200); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card-title { font-size: 0.9rem; font-weight: bold; margin-bottom: 12px; color: var(--primary); border-right: 4px solid var(--primary); padding-right: 10px; }
        
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; font-weight: 600; }
        input, select { width: 100%; padding: 10px; border: 1.5px solid var(--gray-200); border-radius: 8px; font-size: 0.9rem; appearance: none; }
        
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--gray-200); color: var(--gray-700); }
        .btn-danger { background: #fee2e2; color: var(--danger); }
        
        .result-box { background: #f8fafc; border-radius: 8px; padding: 10px; margin: 10px 0; border: 1px dashed var(--primary); }
        .total-price { font-size: 1.1rem; color: var(--primary); font-weight: bold; }
        
        /* التنسيقات الإضافية للسجلات */
        .record-card { border: 1px solid var(--gray-200); padding: 12px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; }
        .status-badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 5px; font-weight: bold; float: left; }
        .status-paid { background: #d1fae5; color: var(--success); }
        .status-partial { background: #fef3c7; color: var(--warning); }
        .status-unpaid { background: #fee2e2; color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-text">
            <h1>N-CURE Professional</h1>
            <p id="live-clock"></p>
        </div>
        <button class="btn btn-secondary" style="width: auto; padding: 8px" onclick="openSettings()">⚙️</button>
    </div>

    <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchTab(0)">➕ فاتورة</button>
        <button class="nav-tab" onclick="switchTab(1)">📦 السجلات</button>
        <button class="nav-tab" onclick="switchTab(2)">🧮 حاسبة</button>
    </div>

    <div class="content">
        <div class="screen active" id="screen-0">
            <div class="card">
                <div class="card-title">👤 بيانات العميل</div>
                <div class="form-group"><label>اسم الصيدلية</label><input type="text" id="inv-pharmacy" value="صيدلية / "></div>
                <div class="form-group"><label>التاريخ</label><input type="date" id="inv-date"></div>
            </div>
            <div class="card">
                <div class="card-title">💊 إضافة أصناف</div>
                <div class="form-group"><select id="inv-drug-select" onchange="updateInvPreview()"></select></div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group"><label>الخصم (%)</label><input type="number" id="inv-discount" value="25" oninput="updateInvPreview()"></div>
                    <div class="form-group"><label>الكمية</label><input type="number" id="inv-qty" value="1" oninput="updateInvPreview()"></div>
                </div>
                <div id="inv-preview-box" class="result-box" style="display:none">
                    <div class="total-price">الإجمالي: <span id="p-total">0</span> ج</div>
                </div>
                <button class="btn btn-primary" onclick="addToCart()">➕ إضافة للفاتورة</button>
            </div>
            <div id="cart-section" class="card" style="display:none">
                <div class="card-title">📝 السلة</div>
                <div id="cart-list"></div>
                <div class="total-price" style="text-align:center; margin:10px 0;">المجموع: <span id="cart-final-total">0</span>ج</div>
                <input type="number" id="inv-paid-amount" placeholder="المبلغ المدفوع" style="margin-bottom:10px">
                <button class="btn btn-primary" style="background:var(--success)" onclick="finalizeInvoice()">💾 حفظ الفاتورة</button>
            </div>
        </div>

        <div class="screen" id="screen-1">
            <div id="records-list"></div>
        </div>

        <div class="screen" id="screen-2">
            <div class="card">
                <div class="card-title">🧮 حاسبة سريعة</div>
                <div class="form-group"><select id="calc-drug-select" onchange="runQuickCalc()"></select></div>
                <div class="form-group"><label>الخصم (%)</label><input type="number" id="calc-disc" value="25" oninput="runQuickCalc()"></div>
                <div id="calc-result-box" class="result-box" style="display:none; text-align:center">
                    <div class="total-price" id="c-total">0 ج</div>
                    <p id="c-tafqeet" style="font-size:0.8rem; color:var(--primary-dark)"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="details-modal"><div class="modal"><div id="modal-content"></div><button class="btn btn-secondary" onclick="closeModal()">إغلاق</button></div></div>
<div class="modal-overlay" id="settings-modal">
    <div class="modal">
        <div class="card-title">⚙️ الإعدادات</div>
        <button class="btn btn-secondary" onclick="exportData()">📥 تصدير البيانات (Backup)</button>
        <button class="btn btn-danger" style="margin-top:10px" onclick="clearData()">🗑️ مسح جميع البيانات</button>
        <button class="btn btn-secondary" style="margin-top:20px" onclick="closeSettings()">رجوع</button>
    </div>
</div>

<script>
    let appData = { drugs: [{id:1, name:'Vitamin D-400', price:50}, {id:2, name:'Probiotic', price:125}], invoices: [], nextId: 1001 };
    let cart = [];

    function init() {
        const saved = localStorage.getItem('ncure_app_v2');
        if(saved) appData = JSON.parse(saved);
        document.getElementById('inv-date').valueAsDate = new Date();
        updateDrugLists();
        renderRecords();
        startTime();
    }

    function saveData() { localStorage.setItem('ncure_app_v2', JSON.stringify(appData)); }

    function switchTab(i) {
        document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
        document.getElementById(`screen-${i}`).classList.add('active');
        document.querySelectorAll('.nav-tab')[i].classList.add('active');
        if(i===1) renderRecords();
    }

    function updateDrugLists() {
        const html = '<option value="">-- اختر المنتج --</option>' + appData.drugs.map(d=>`<option value="${d.id}">${d.name} (${d.price}ج)</option>`).join('');
        document.getElementById('inv-drug-select').innerHTML = html;
        document.getElementById('calc-drug-select').innerHTML = html;
    }

    function updateInvPreview() {
        const id = document.getElementById('inv-drug-select').value;
        if(!id) return;
        const d = appData.drugs.find(x=>x.id==id);
        const disc = parseFloat(document.getElementById('inv-discount').value)||0;
        const qty = parseInt(document.getElementById('inv-qty').value)||1;
        document.getElementById('p-total').innerText = ((d.price * (1-disc/100)) * qty).toFixed(2);
        document.getElementById('inv-preview-box').style.display = 'block';
    }

    function addToCart() {
        const id = document.getElementById('inv-drug-select').value;
        const d = appData.drugs.find(x=>x.id==id);
        const disc = parseFloat(document.getElementById('inv-discount').value)||0;
        const qty = parseInt(document.getElementById('inv-qty').value)||1;
        const total = (d.price * (1-disc/100)) * qty;
        cart.push({name: d.name, qty, total});
        renderCart();
    }

    function renderCart() {
        const box = document.getElementById('cart-section');
        box.style.display = cart.length ? 'block' : 'none';
        document.getElementById('cart-list').innerHTML = cart.map(c=>`<div>${c.name} (x${c.qty}) - ${c.total.toFixed(2)}ج</div>`).join('');
        document.getElementById('cart-final-total').innerText = cart.reduce((s,i)=>s+i.total, 0).toFixed(2);
    }

    function finalizeInvoice() {
        const total = cart.reduce((s,i)=>s+i.total, 0);
        const paid = parseFloat(document.getElementById('inv-paid-amount').value)||0;
        appData.invoices.unshift({
            id: appData.nextId++,
            pharmacy: document.getElementById('inv-pharmacy').value,
            date: document.getElementById('inv-date').value,
            total, paid,
            status: paid >= total ? 'paid' : (paid > 0 ? 'partial' : 'unpaid')
        });
        saveData();
        cart = [];
        renderCart();
        switchTab(1);
    }

    function renderRecords() {
        document.getElementById('records-list').innerHTML = appData.invoices.map(inv=>`
            <div class="record-card">
                <span class="status-badge status-${inv.status}">${inv.status}</span>
                <b>${inv.pharmacy}</b><br>
                <small>#${inv.id} - ${inv.date}</small><br>
                <span>المتبقي: ${(inv.total - inv.paid).toFixed(2)}ج</span>
            </div>
        `).join('');
    }

    function runQuickCalc() {
        const id = document.getElementById('calc-drug-select').value;
        if(!id) return;
        const d = appData.drugs.find(x=>x.id==id);
        const disc = parseFloat(document.getElementById('calc-disc').value)||0;
        const res = d.price * (1-disc/100);
        document.getElementById('c-total').innerText = res.toFixed(2) + ' ج';
        document.getElementById('c-tafqeet').innerText = "فقط " + Math.floor(res) + " جنيهاً لا غير";
        document.getElementById('calc-result-box').style.display = 'block';
    }

    function openSettings() { document.getElementById('settings-modal').style.display='flex'; }
    function closeSettings() { document.getElementById('settings-modal').style.display='none'; }
    function closeModal() { document.getElementById('details-modal').style.display='none'; }
    function clearData() { if(confirm('حذف كل البيانات؟')){ localStorage.clear(); location.reload(); } }
    function exportData() { alert(JSON.stringify(appData)); }
    function startTime() { document.getElementById('live-clock').innerHTML = new Date().toLocaleTimeString('ar-EG'); setTimeout(startTime, 1000); }

    init();
</script>
</body>
</html>
