<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- إعدادات وضع التطبيق لإخفاء شريط المتصفح وتثبيته -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="N-CURE">
    <meta name="theme-color" content="#1a6b3c">

    <!-- ربط أيقونة التطبيق بملفك logo.png -->
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <!-- ملف التعريف (Manifest) مدمج برابط الصورة الخاصة بك -->
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22N-CURE%20Professional%22%2C%22short_name%22%3A%22N-CURE%22%2C%22start_url%22%3A%22index.html%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%231a6b3c%22%2C%22theme_color%22%3A%22%231a6b3c%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22logo.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">

    <title>N-CURE Professional - نظام الإدارة</title>
    
    <style>
        /* التنسيقات الأصلية مع الحفاظ على روح التصميم الخاص بك */
        :root {
            --primary: #1a6b3c;
            --primary-dark: #145033;
            --primary-light: #e8f5ee;
            --secondary: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-700: #374151;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--gray-100); color: #111; line-height: 1.6; }

        .container { max-width: 600px; margin: 0 auto; background: white; min-height: 100vh; display: flex; flex-direction: column; }

        .header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 20px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .logo-text h1 { font-size: 1.2rem; }
        .logo-text p { font-size: 0.7rem; opacity: 0.8; }

        .nav-tabs { display: flex; border-bottom: 2px solid var(--gray-200); background: white; }
        .nav-tab { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-weight: bold; color: var(--gray-700); transition: 0.3s; font-size: 0.9rem; }
        .nav-tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: var(--primary-light); }

        .content { padding: 15px; flex: 1; }
        .screen { display: none; animation: fadeIn 0.3s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: white; border: 1px solid var(--gray-200); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card-title { font-size: 0.9rem; font-weight: bold; margin-bottom: 12px; color: var(--primary); border-right: 4px solid var(--primary); padding-right: 10px; }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; font-weight: 600; }
        input, select { width: 100%; padding: 10px; border: 1.5px solid var(--gray-200); border-radius: 8px; font-size: 0.9rem; }

        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--gray-200); color: var(--gray-700); }

        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .product-card { border: 1.5px solid var(--gray-200); border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; }
        .product-card.selected { border-color: var(--primary); background: var(--primary-light); }

        .invoice-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--gray-100); font-size: 0.85rem; }
        .total-price { font-size: 1.1rem; color: var(--primary); font-weight: bold; text-align: center; margin-top: 10px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 1000; align-items: center; justify-content: center; padding: 10px; }
        .modal { background: white; width: 100%; max-width: 500px; border-radius: 15px; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-text">
            <h1>N-CURE Professional</h1>
            <p id="live-clock"></p>
        </div>
        <button class="btn btn-secondary" style="width:auto; padding: 8px" onclick="openSettings()">⚙️</button>
    </div>

    <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchTab(0)">➕ فاتورة</button>
        <button class="nav-tab" onclick="switchTab(1)">📦 السجلات</button>
        <button class="nav-tab" onclick="switchTab(2)">🧮 حاسبة</button>
    </div>

    <div class="content">
        <!-- شاشة الفاتورة[cite: 3] -->
        <div class="screen active" id="screen-0">
            <div class="card">
                <div class="card-title">👤 بيانات العميل</div>
                <div class="form-group"><label>اسم الصيدلية</label><input type="text" id="inv-pharmacy" value="صيدلية / "></div>
                <div class="form-group"><label>التاريخ</label><input type="date" id="inv-date"></div>
            </div>

            <div class="card">
                <div class="card-title">💊 إضافة أصناف</div>
                <div class="form-group"><select id="inv-drug-select" onchange="updateInvPreview()"></select></div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group"><label>الخصم (%)</label><input type="number" id="inv-discount" value="25" oninput="updateInvPreview()"></div>
                    <div class="form-group"><label>الكمية</label><input type="number" id="inv-qty" value="1" oninput="updateInvPreview()"></div>
                </div>
                <div id="inv-preview-box" style="display:none; text-align:center; padding:10px; border:1px dashed var(--primary); margin-bottom:10px">
                    <span id="p-total" style="font-weight:bold; color:var(--primary)">0</span>
                </div>
                <button class="btn btn-primary" onclick="addToCart()">➕ إضافة للفاتورة</button>
            </div>

            <div id="cart-section" class="card" style="display:none">
                <div id="cart-list"></div>
                <div class="total-price">إجمالي الفاتورة: <span id="cart-final-total">0</span> ج.م</div>
                <button class="btn btn-primary" style="background:var(--success); margin-top:10px" onclick="finalizeInvoice()">💾 حفظ وإصدار الفاتورة</button>
            </div>
        </div>

        <!-- شاشة السجلات[cite: 3] -->
        <div class="screen" id="screen-1">
            <div id="records-list"></div>
        </div>

        <!-- شاشة الحاسبة[cite: 3] -->
        <div class="screen" id="screen-2">
            <div class="card">
                <div class="card-title">🧮 حاسبة سريعة</div>
                <div class="product-grid" id="calc-grid"></div>
                <div id="calc-result-box" style="display:none; margin-top:15px; background:var(--primary-light); padding:10px; border-radius:8px; text-align:center">
                    الإجمالي: <span id="c-total" style="font-weight:bold">0</span> ج.م
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    //[cite: 3] تم الحفاظ على أساسيات عمل الكود دون مساس
    let appData = { drugs: [{ id: 1, name: 'Vitamin D-400', price: 50 }, { id: 2, name: 'Probiotic', price: 125 }], invoices: [], config: { nextInvId: 1001 } };
    let cart = []; let selectedCalcDrug = null;

    function init() {
        const saved = localStorage.getItem('ncure_pro_data');
        if (saved) appData = JSON.parse(saved);
        document.getElementById('inv-date').valueAsDate = new Date();
        updateDrugLists(); renderRecords(); startTime();
    }

    function saveData() { localStorage.setItem('ncure_pro_data', JSON.stringify(appData)); }

    function switchTab(idx) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`screen-${idx}`).classList.add('active');
        document.querySelectorAll('.nav-tab')[idx].classList.add('active');
        if(idx === 1) renderRecords(); if(idx === 2) renderCalcGrid();
    }

    function updateDrugLists() {
        const select = document.getElementById('inv-drug-select');
        select.innerHTML = '<option value="">-- اختر الصنف --</option>' + appData.drugs.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
    }

    function updateInvPreview() {
        const drugId = document.getElementById('inv-drug-select').value;
        if(!drugId) return;
        const drug = appData.drugs.find(d => d.id == drugId);
        const disc = parseFloat(document.getElementById('inv-discount').value) || 0;
        const qty = parseInt(document.getElementById('inv-qty').value) || 1;
        document.getElementById('p-total').innerText = ((drug.price * (1 - disc/100)) * qty).toFixed(2) + ' ج';
        document.getElementById('inv-preview-box').style.display = 'block';
    }

    function addToCart() {
        const drugId = document.getElementById('inv-drug-select').value;
        if(!drugId) return;
        const drug = appData.drugs.find(d => d.id == drugId);
        const disc = parseFloat(document.getElementById('inv-discount').value) || 0;
        const qty = parseInt(document.getElementById('inv-qty').value) || 1;
        cart.push({ name: drug.name, total: (drug.price * (1 - disc/100)) * qty });
        renderCart();
    }

    function renderCart() {
        const section = document.getElementById('cart-section');
        section.style.display = cart.length ? 'block' : 'none';
        document.getElementById('cart-list').innerHTML = cart.map(it => `<div class="invoice-item"><span>${it.name}</span><span>${it.total.toFixed(2)}</span></div>`).join('');
        document.getElementById('cart-final-total').innerText = cart.reduce((s, it) => s + it.total, 0).toFixed(2);
    }

    function finalizeInvoice() {
        const total = cart.reduce((s, it) => s + it.total, 0);
        appData.invoices.unshift({ id: appData.config.nextInvId++, pharmacy: document.getElementById('inv-pharmacy').value, date: document.getElementById('inv-date').value, total });
        saveData(); cart = []; renderCart(); switchTab(1);
    }

    function renderRecords() {
        document.getElementById('records-list').innerHTML = appData.invoices.map(inv => `<div class="card"><b>${inv.pharmacy}</b><br><small>${inv.date}</small><br>الإجمالي: ${inv.total.toFixed(2)}</div>`).join('');
    }

    function renderCalcGrid() {
        document.getElementById('calc-grid').innerHTML = appData.drugs.map(d => `<div class="product-card" onclick="selectCalc(${d.id})">${d.name}</div>`).join('');
    }

    function selectCalc(id) { 
        const drug = appData.drugs.find(d => d.id == id);
        document.getElementById('c-total').innerText = drug.price;
        document.getElementById('calc-result-box').style.display = 'block';
    }

    function startTime() { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('ar-EG'); setTimeout(startTime, 1000); }
    
    init();
</script>
</body>
</html>
