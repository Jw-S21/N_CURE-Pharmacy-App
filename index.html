<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a6b3c">
    <title>N-CURE</title>

    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22N-CURE%22%2C%22short_name%22%3A%22N-CURE%22%2C%22start_url%22%3A%22index.html%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%231a6b3c%22%2C%22theme_color%22%3A%22%231a6b3c%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22logo.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">

    <style>
        :root { --primary: #1a6b3c; --primary-dark: #0f4024; --bg: #f2f2f2; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #333; line-height: 1.3; }

        .header { background: var(--primary); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 99; }
        .header h1 { font-size: 1.2rem; font-weight: bold; }
        .settings-btn { background: none; border: none; font-size: 1.3rem; color: white; cursor: pointer; }

        .tabs { display: flex; background: white; border-bottom: 1px solid #ddd; }
        .tab { flex: 1; padding: 12px; border: none; background: none; font-weight: bold; color: #666; font-size: 0.85rem; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #f9f9f9; }

        .content { padding: 8px; }
        .screen { display: none; }
        .screen.active { display: block; }

        .card { background: white; border-radius: 8px; padding: 10px; margin-bottom: 8px; border: 1px solid #e0e0e0; }
        .card-title { font-size: 0.8rem; font-weight: bold; color: var(--primary); margin-bottom: 6px; border-right: 3px solid var(--primary); padding-right: 6px; }

        label { font-size: 0.7rem; font-weight: bold; display: block; margin-top: 4px; color: #555; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 0.9rem; margin-top: 2px; }
        
        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 8px; font-size: 0.9rem; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-save { background: var(--success); color: white; }
        .btn-close { background: #eee; color: #333; }
        .btn-outline { background: white; border: 1px solid var(--primary); color: var(--primary); }

        .filters { display: flex; gap: 4px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; }
        .filter-btn { padding: 6px 10px; border-radius: 20px; border: 1px solid #ddd; background: white; font-size: 0.7rem; white-space: nowrap; cursor: pointer; }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .table-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 0.5fr; background: #eee; padding: 5px; font-size: 0.65rem; font-weight: bold; margin-top: 10px; }
        .table-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 0.5fr; padding: 5px; font-size: 0.75rem; border-bottom: 1px solid #f0f0f0; align-items: center; }
        .total-box { text-align: center; padding: 10px; font-weight: bold; color: var(--primary); font-size: 1.1rem; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal { background: white; width: 100%; border-radius: 12px; padding: 15px; max-height: 85vh; overflow-y: auto; }

        .record-item { background: white; padding: 10px; border-radius: 8px; margin-bottom: 6px; border: 1px solid #ddd; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-left: 5px; }
        
        .delete-btn { color: var(--danger); border: none; background: none; font-size: 1rem; cursor: pointer; }

        /* تنسيق اللوجو في الفاتورة */
        .invoice-logo { width: 60px; height: 60px; object-fit: contain; margin-bottom: 5px; border-radius: 5px; }

        @media print {
            .header, .tabs, .filters, .btn, input, select { display: none !important; }
            .modal-overlay { position: static; background: white; display: block; }
            .modal { box-shadow: none; max-height: none; width: 100%; border: none; }
            .delete-btn { display: none; }
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>N-CURE</h1>
        <small id="clock" style="font-size: 0.6rem;"></small>
    </div>
    <button class="settings-btn" onclick="openModal('settings-modal')">⚙️</button>
</div>

<div class="tabs">
    <button class="tab active" onclick="showScreen(0)">➕ فاتورة</button>
    <button class="tab" onclick="showScreen(1)">📦 السجلات</button>
    <button class="tab" onclick="showScreen(2)">🧮 حاسبة</button>
</div>

<div class="content">
    <div class="screen active" id="s0">
        <div class="card">
            <div class="card-title">بيانات العميل</div>
            <label>اسم الصيدلية</label>
            <input type="text" id="p-pharm" value="صيدلية / ">
            <label>المستلم (دكتور)</label>
            <input type="text" id="p-doc" value="دكتور/ ">
            <label>التاريخ</label>
            <input type="date" id="p-date">
        </div>
        <div class="card">
            <div class="card-title">إضافة أصناف</div>
            <select id="p-drug" onchange="updatePre()"></select>
            <div style="display:flex; gap:5px">
                <div style="flex:1"><label>خصم%</label><input type="number" id="p-disc" value="25" inputmode="decimal" oninput="updatePre()"></div>
                <div style="flex:1"><label>كمية</label><input type="number" id="p-qty" value="1" inputmode="numeric" oninput="updatePre()"></div>
            </div>
            <div id="pre-box" style="display:none; text-align:center; font-size:0.8rem; color:var(--primary); margin-top:5px; font-weight:bold;"></div>
            <button class="btn btn-main" onclick="addItem()">➕ إضافة للفاتورة</button>
        </div>
        <div id="cart-card" class="card" style="display:none">
            <div class="card-title">قائمة الأصناف المختارة</div>
            <div class="table-header"><span>الصنف</span><span>سعر</span><span>كمية</span><span>صافي</span><span></span></div>
            <div id="cart-list"></div>
            <div class="total-box">إجمالي الفاتورة: <span id="cart-total">0</span> ج</div>
            <label>المبلغ المدفوع الآن</label>
            <input type="number" id="p-paid" placeholder="0.00" inputmode="decimal">
            <button class="btn btn-save" onclick="saveInv()">💾 حفظ الفاتورة نهائياً</button>
        </div>
    </div>

    <div class="screen" id="s1">
        <div class="filters">
            <button class="filter-btn active" onclick="filterRecs('all')">الكل (<span id="count-all">0</span>)</button>
            <button class="filter-btn" onclick="filterRecs('unpaid')">غير مسدد (<span id="count-unpaid">0</span>)</button>
            <button class="filter-btn" onclick="filterRecs('partial')">جزئي (<span id="count-partial">0</span>)</button>
            <button class="filter-btn" onclick="filterRecs('paid')">مسدد (<span id="count-paid">0</span>)</button>
        </div>
        <div id="rec-list"></div>
    </div>

    <div class="screen" id="s2">
        <div class="card">
            <div class="card-title">حاسبة الخصم والكمية</div>
            <select id="c-drug" onchange="doCalc()"></select>
            <div style="display:flex; gap:5px">
                <div style="flex:1"><label>الخصم %</label><input type="number" id="c-disc" value="25" inputmode="decimal" oninput="doCalc()"></div>
                <div style="flex:1"><label>الكمية</label><input type="number" id="c-qty" value="1" inputmode="numeric" oninput="doCalc()"></div>
            </div>
            <div class="total-box" id="c-res">0.00 ج</div>
            <small id="c-unit" style="display:block; text-align:center; color:#666; font-size:0.7rem"></small>
        </div>
    </div>
</div>

<div class="modal-overlay" id="settings-modal">
    <div class="modal">
        <div class="card-title">⚙️ إدارة المنتجات والإعدادات</div>
        <div style="background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:15px">
            <label>اسم المنتج الجديد</label>
            <input type="text" id="new-drug-name">
            <label>السعر الأساسي</label>
            <input type="number" id="new-drug-price" inputmode="decimal">
            <button class="btn btn-save" onclick="addNewDrug()">➕ إضافة للمخزن</button>
        </div>
        <button class="btn btn-outline" onclick="exportData()">📥 تصدير البيانات</button>
        <button class="btn" style="background:#fee2e2; color:red" onclick="clearData()">🗑️ مسح جميع السجلات</button>
        <button class="btn btn-main" onclick="closeModal('settings-modal')" style="margin-top:15px">إغلاق</button>
    </div>
</div>

<div class="modal-overlay" id="inv-modal">
    <div class="modal" id="inv-details-content"></div>
</div>

<script>
    let app = { 
        drugs: [{id:1, name:'Vitamin D-400', price:50}, {id:2, name:'Probiotic', price:125}], 
        logs: [], 
        next: 101 
    };
    let tempCart = [];
    let currentFilter = 'all';

    function init() {
        const d = localStorage.getItem('ncure_final_v8');
        if(d) app = JSON.parse(d);
        document.getElementById('p-date').valueAsDate = new Date();
        loadSelects(); updateCounts(); renderRecs(); tick();
    }

    function save() { localStorage.setItem('ncure_final_v8', JSON.stringify(app)); }

    function showScreen(i) {
        document.querySelectorAll('.screen, .tab').forEach((el, idx) => {
            el.classList.toggle('active', idx % 3 === i);
        });
        if(i===1) renderRecs();
    }

    function loadSelects() {
        const opt = '<option value="">-- اختر صنف --</option>' + app.drugs.map(x=>`<option value="${x.id}">${x.name} (${x.price}ج)</option>`).join('');
        document.getElementById('p-drug').innerHTML = opt;
        document.getElementById('c-drug').innerHTML = opt;
    }

    function addNewDrug() {
        const name = document.getElementById('new-drug-name').value;
        const price = parseFloat(document.getElementById('new-drug-price').value);
        if(!name || !price) return;
        app.drugs.push({ id: Date.now(), name, price });
        save(); loadSelects();
        document.getElementById('new-drug-name').value = '';
        document.getElementById('new-drug-price').value = '';
        alert('تمت الإضافة');
    }

    function updatePre() {
        const id = document.getElementById('p-drug').value;
        if(!id) return;
        const itm = app.drugs.find(x=>x.id==id);
        const net = itm.price * (1 - (document.getElementById('p-disc').value/100));
        document.getElementById('pre-box').innerHTML = `صافي القطعة: ${net.toFixed(2)} ج`;
        document.getElementById('pre-box').style.display = 'block';
    }

    function addItem() {
        const id = document.getElementById('p-drug').value;
        if(!id) return;
        const itm = app.drugs.find(x=>x.id==id);
        const disc = document.getElementById('p-disc').value;
        const net = itm.price * (1 - (disc/100));
        const q = parseFloat(document.getElementById('p-qty').value) || 1;
        tempCart.push({ id: Date.now(), name: itm.name, price: net, qty: q, sub: net * q });
        renderCart();
    }

    function removeItem(tempId) {
        tempCart = tempCart.filter(item => item.id !== tempId);
        renderCart();
    }

    function renderCart() {
        const container = document.getElementById('cart-card');
        container.style.display = tempCart.length ? 'block' : 'none';
        document.getElementById('cart-list').innerHTML = tempCart.map(i=>`
            <div class="table-row">
                <span>${i.name}</span><span>${i.price.toFixed(1)}</span><span>${i.qty}</span><span>${i.sub.toFixed(1)}</span>
                <button class="delete-btn" onclick="removeItem(${i.id})">🗑️</button>
            </div>
        `).join('');
        document.getElementById('cart-total').innerText = tempCart.reduce((a,b)=>a+b.sub, 0).toFixed(2);
    }

    function saveInv() {
        const total = tempCart.reduce((a,b)=>a+b.sub, 0);
        const paid = parseFloat(document.getElementById('p-paid').value) || 0;
        app.logs.unshift({
            id: app.next++,
            pharm: document.getElementById('p-pharm').value,
            doc: document.getElementById('p-doc').value,
            date: document.getElementById('p-date').value,
            items: [...tempCart],
            total, paid,
            history: [{ date: new Date().toLocaleString('ar-EG'), amt: paid }]
        });
        save(); tempCart = []; renderCart(); 
        document.getElementById('p-paid').value = '';
        updateCounts(); showScreen(1);
    }

    function filterRecs(f) {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.innerHTML.includes(f === 'all' ? 'الكل' : f === 'unpaid' ? 'غير مسدد' : f === 'partial' ? 'جزئي' : 'مسدد')));
        renderRecs();
    }

    function updateCounts() {
        document.getElementById('count-all').innerText = app.logs.length;
        document.getElementById('count-unpaid').innerText = app.logs.filter(l => l.paid <= 0).length;
        document.getElementById('count-partial').innerText = app.logs.filter(l => l.paid > 0 && l.paid < l.total).length;
        document.getElementById('count-paid').innerText = app.logs.filter(l => l.paid >= l.total).length;
    }

    function renderRecs() {
        let list = app.logs;
        if(currentFilter === 'unpaid') list = list.filter(l => l.paid <= 0);
        if(currentFilter === 'partial') list = list.filter(l => l.paid > 0 && l.paid < l.total);
        if(currentFilter === 'paid') list = list.filter(l => l.paid >= l.total);

        document.getElementById('rec-list').innerHTML = list.map(l=>{
            const rem = l.total - l.paid;
            let color = rem <= 0 ? 'var(--success)' : (l.paid > 0 ? 'var(--warning)' : 'var(--danger)');
            return `
                <div class="record-item" onclick="openInv(${l.id})">
                    <div style="font-weight:bold; font-size:0.85rem"><span class="status-dot" style="background:${color}"></span>${l.pharm}</div>
                    <div style="font-size:0.7rem; color:#666">${l.doc} | ${l.date}</div>
                    <div style="font-weight:bold; color:${color}; font-size:0.85rem">المتبقي: ${rem.toFixed(1)} ج</div>
                </div>
            `;
        }).join('');
    }

    function openInv(id) {
        const l = app.logs.find(x=>x.id==id);
        document.getElementById('inv-details-content').innerHTML = `
            <div id="printable-area">
                <div style="text-align:center; border-bottom:2px solid var(--primary); padding-bottom:5px">
                    <img src="logo.png" class="invoice-logo" alt="N-CURE" onerror="this.style.display='none'">
                    <h2 style="color:var(--primary); font-size:1.4rem">N-CURE</h2>
                    <p style="font-size:0.8rem">فاتورة رقم #${l.id}</p>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:0.75rem; margin:10px 0">
                    <span><b>الصيدلية:</b> ${l.pharm}</span>
                    <span><b>التاريخ:</b> ${l.date}</span>
                </div>
                <p style="font-size:0.75rem"><b>المستلم:</b> ${l.doc}</p>
                <div class="table-header" style="grid-template-columns: 2fr 1fr 1fr 1fr"><span>الصنف</span><span>سعر</span><span>كمية</span><span>صافي</span></div>
                ${l.items.map(i=>`<div class="table-row" style="grid-template-columns: 2fr 1fr 1fr 1fr"><span>${i.name}</span><span>${i.price.toFixed(1)}</span><span>${i.qty}</span><span>${i.sub.toFixed(1)}</span></div>`).join('')}
                <div class="total-box">إجمالي: ${l.total.toFixed(2)} ج</div>
                <div style="background:#f9f9f9; padding:8px; border-radius:8px">
                    <p style="font-size:0.7rem"><b>التحصيلات:</b></p>
                    ${l.history.map(h=>`<div style="font-size:0.7rem; display:flex; justify-content:space-between; border-bottom:1px solid #eee"><span>${h.date}</span><b>${h.amt} ج</b></div>`).join('')}
                </div>
                <div style="text-align:left; margin-top:10px; font-weight:bold; color:var(--danger)">المتبقي: ${(l.total - l.paid).toFixed(2)} ج</div>
            </div>
            <button class="btn btn-save" onclick="window.print()">🖨️ طباعة / حفظ</button>
            <input type="number" id="up-amt" placeholder="تحصيل جديد" inputmode="decimal" style="margin-top:10px">
            <button class="btn btn-main" onclick="updatePaid(${id})">تحديث السداد</button>
            <button class="btn btn-close" onclick="closeModal('inv-modal')">إغلاق</button>
        `;
        openModal('inv-modal');
    }

    function updatePaid(id) {
        const amt = parseFloat(document.getElementById('up-amt').value);
        if(!amt) return;
        const l = app.logs.find(x=>x.id==id);
        l.paid += amt;
        l.history.unshift({ date: new Date().toLocaleString('ar-EG'), amt: amt });
        save(); updateCounts(); renderRecs(); openInv(id);
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    
    function doCalc() {
        const id = document.getElementById('c-drug').value;
        if(!id) return;
        const itm = app.drugs.find(x=>x.id==id);
        const qty = parseFloat(document.getElementById('c-qty').value) || 1;
        const disc = parseFloat(document.getElementById('c-disc').value) || 0;
        const unitNet = itm.price * (1 - (disc/100));
        const total = unitNet * qty;
        document.getElementById('c-res').innerText = total.toFixed(2) + ' ج';
        document.getElementById('c-unit').innerText = `صافي الوحدة: ${unitNet.toFixed(2)} ج`;
    }

    function exportData() { alert(JSON.stringify(app)); }
    function clearData() { if(confirm('مسح الكل؟')){ app.logs=[]; save(); location.reload(); } }
    function tick() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-EG'); setTimeout(tick, 1000); }
    init();
</script>
</body>
</html>
